<h1 id="Git项目clone慢"><a href="#Git项目clone慢" class="headerlink" title="Git项目clone慢"></a>Git项目clone慢</h1><figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta prompt_"># </span><span class="language-bash">比较大的项目，只克隆最后一次提交的，可以减少要<span class="built_in">clone</span>的文件</span></span><br><span class="line">git clone --depth=1 git地址</span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">如果有科学上网，可以设置代理</span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">注意git是没有https代理的，http包含了https，另外地址上不能加单引号</span></span><br><span class="line">git config --global http.proxy socks5://127.0.0.1:10808</span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">取消代理</span></span><br><span class="line">git config --global --unset http.proxy</span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">查看git的所有配置</span></span><br><span class="line">git config --global --list</span><br></pre></td></tr></table></figure>
